<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="white" stroke-width="20" opacity="0.9"/>
  <!-- Clock hour hand -->
  <line x1="256" y1="240" x2="256" y2="150" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Clock minute hand -->
  <line x1="256" y1="240" x2="320" y2="200" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="12" fill="white"/>
  <!-- "AT" text -->
  <text x="256" y="440" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="72" fill="white" opacity="0.95">AT</text>
</svg>
